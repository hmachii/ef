# easy_filer key map
# format: bind <key_token> <command_name>
# key_token examples: ch:j, ch:/, key:ENTER, key:LEFT
bind ch:/ search.input.start
bind ch:g grep.input.start
bind ch:: command.input.start
bind key:F2 rename.input.start
bind key:ESC app.quit
bind key:BACKSPACE navigation.up
bind key:BACKSPACE2 navigation.up
bind ch:h navigation.up
bind key:LEFT history.back
bind key:RIGHT history.forward
bind key:ENTER entry.open_or_enter
bind ch:l directory.enter
bind key:UP cursor.up
bind ch:k cursor.up
bind key:DOWN cursor.down
bind ch:j cursor.down
bind ch:c clipboard.mark_copy
bind ch:x clipboard.mark_cut
bind ch:v clipboard.paste
bind ch:b entry.duplicate
bind ch:r directory.refresh
bind key:DELETE entry.delete
